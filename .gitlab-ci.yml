image: oven/bun:latest

default:
  interruptible: true

stages:
  - install
  - quality
  - build
  - deploy

variables:
  NEXT_TELEMETRY_DISABLED: "1"
  GIT_DEPTH: 10
  GIT_STRATEGY: fetch

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: always

# Top-level cache: jobs inherit pull-only by default.
# install_dependencies and build jobs override to pull-push so they can update it.
cache:
  key:
    files:
      - bun.lock
  paths:
    - node_modules/
    - .next/cache/
  policy: pull

# ====================================================
# INSTALL
# ====================================================

install_dependencies:
  stage: install
  script:
    - bun install --frozen-lockfile
  cache:
    key:
      files:
        - bun.lock
    paths:
      - node_modules/
      - .next/cache/
    policy: pull-push

# ====================================================
# QUALITY
# ====================================================

.quality_template: &quality_config
  stage: quality
  needs:
    - job: install_dependencies
      optional: true

lint:
  <<: *quality_config
  script:
    - bun run lint

format:
  <<: *quality_config
  script:
    - bun run format

type-check:
  <<: *quality_config
  script:
    - bun run typecheck

# ====================================================
# BUILD
# ====================================================

# Validation build: runs on every branch including main, only after quality checks pass.
# On main, this acts as a pre-deploy safety net before Vercel deploy.
build:validate:
  stage: build
  needs:
    - job: install_dependencies
      optional: true
    - lint
    - format
    - type-check
  cache:
    key:
      files:
        - bun.lock
    paths:
      - node_modules/
      - .next/cache/
    policy: pull-push
  script:
    - echo "Running standard build for validation."
    - bun run build

# ====================================================
# DEPLOY
# ====================================================

# Production deploy: runs only on main, after build:validate passes.
# build:validate transitively gates this on install + lint + format + type-check.
# Requires VERCEL_TOKEN as a masked + protected CI/CD variable.
# Requires `main` to be a protected branch in repo settings.
deploy:vercel_production:
  stage: deploy
  interruptible: false # never cancel a production deploy mid-flight
  needs:
    - job: build:validate
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  resource_group: production
  cache: [] # Vercel CLI handles its own dependencies — no need to pull our cache
  script:
    - echo "Building for Vercel Production..."
    - bunx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - bunx vercel build --prod --token=$VERCEL_TOKEN
    - echo "Deploying prebuilt artifacts to Vercel..."
    - bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
